name: Build Linux amd64 musl

on:
  workflow_dispatch:

env:
  GO_VERSION: '1.21'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Build
        id: build
        run: |
          # 构建参数
          BUILD_LDFLAGS="-w -s"
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          BUILD_GIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          
          echo "Build time: $BUILD_TIME"
          echo "Build git: $BUILD_GIT"
          
          # 清理之前的构建
          rm -f katelyatv-go_linux_amd64_musl katelyatv-go_linux_amd64_musl.tar.gz
          
          # Linux amd64 musl 构建 - 禁用CGO，纯Go实现
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="${BUILD_LDFLAGS} -X main.buildTime=${BUILD_TIME} -X main.buildGit=${BUILD_GIT}" \
            -o katelyatv-go_linux_amd64_musl \
            ./cmd/server

      - name: Verify binary
        run: |
          echo "Binary info:"
          file katelyatv-go_linux_amd64_musl
          ls -lh katelyatv-go_linux_amd64_musl
          # 验证是静态链接
          ldd katelyatv-go_linux_amd64_musl || echo "Static binary (ldd shows nothing)"

      - name: Create release package
        run: |
          mkdir -p release
          
          # 创建默认配置文件
          cat > config.example.json << 'EOF'
          {
            "cache_time": 7200,
            "api_site": {}
          }
          EOF
          
          # 创建启动脚本
          cat > start.sh << 'EOF'
          #!/bin/bash
          PORT=${PORT:-3000}
          DATA_DIR=${DATA_DIR:-./data}
          CONFIG=${CONFIG:-./config.json}
          
          echo "Starting KatelyaTV-Go..."
          echo "Port: $PORT"
          echo "Data dir: $DATA_DIR"
          echo "Config: $CONFIG"
          
          ./katelyatv-go_linux_amd64_musl --port $PORT --data-dir "$DATA_DIR" --config "$CONFIG"
          EOF
          chmod +x start.sh
          
          # 打包
          tar -czf release/katelyatv-go_linux_amd64_musl.tar.gz \
            katelyatv-go_linux_amd64_musl \
            config.example.json \
            start.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: katelyatv-go_linux_amd64_musl
          path: release/katelyatv-go_linux_amd64_musl.tar.gz
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: katelyatv-go_linux_amd64_musl
          path: release

      - name: Extract and test
        run: |
          cd release
          tar -xzf katelyatv-go_linux_amd64_musl.tar.gz
          chmod +x katelyatv-go_linux_amd64_musl
          
          # 测试运行（5秒后自动退出）
          timeout 5 ./katelyatv-go_linux_amd64_musl --port 8080 || true
          echo "Binary test completed"
