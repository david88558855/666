<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - KatelyaTV-Go</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .settings-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .settings-title {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .setting-label {
            font-weight: 500;
        }
        .setting-desc {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .btn-save:hover {
            background: #c62f2f;
        }
        .btn-secondary {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        .admin-section {
            display: none;
        }
        .admin-section.show {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .table th, .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .table th {
            color: var(--text-secondary);
            font-weight: normal;
            font-size: 12px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .badge-success { background: #4CAF50; color: #fff; }
        .badge-warning { background: #ff9800; color: #fff; }
        .btn-danger {
            background: #f44336;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-primary {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1001;
        }
        .toast.show {
            display: block;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">🎬 KatelyaTV-Go</a>
                <nav class="nav">
                    <a href="/" class="nav-item">首页</a>
                    <a href="/settings" class="nav-item active">设置</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="settings-container">
        <!-- 管理员区域 -->
        <div class="settings-card admin-section" id="adminSection">
            <h2 class="settings-title">👑 用户管理</h2>
            <p style="color: var(--text-secondary); margin-bottom: 15px; font-size: 14px;">
                管理员可在此创建新用户
            </p>
            <button class="btn-primary" onclick="showAddUserModal()">➕ 添加用户</button>
            
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="4">加载中...</td></tr>
                </tbody>
            </table>
            
            <div style="margin-top: 20px;">
                <a href="/admin" class="btn-secondary">进入管理后台 →</a>
            </div>
        </div>

        <!-- 用户外观设置 -->
        <div class="settings-card">
            <h2 class="settings-title">外观设置</h2>
            
            <div class="setting-item">
                <div>
                    <div class="setting-label">主题</div>
                    <div class="setting-desc">选择界面主题</div>
                </div>
                <select id="themeSelect" onchange="saveSettings()">
                    <option value="auto">跟随系统</option>
                    <option value="dark">深色</option>
                    <option value="light">浅色</option>
                </select>
            </div>

            <div class="setting-item">
                <div>
                    <div class="setting-label">布局</div>
                    <div class="setting-desc">选择内容显示方式</div>
                </div>
                <select id="layoutSelect" onchange="saveSettings()">
                    <option value="grid">网格</option>
                    <option value="list">列表</option>
                </select>
            </div>

            <div class="setting-item">
                <div>
                    <div class="setting-label">每页数量</div>
                    <div class="setting-desc">每页显示的条目数</div>
                </div>
                <select id="itemsPerPageSelect" onchange="saveSettings()">
                    <option value="12">12</option>
                    <option value="24">24</option>
                    <option value="48">48</option>
                </select>
            </div>
        </div>

        <div class="settings-card">
            <h2 class="settings-title">内容设置</h2>
            
            <div class="setting-item">
                <div>
                    <div class="setting-label">成人内容过滤</div>
                    <div class="setting-desc">开启后隐藏成人内容资源站和搜索结果</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="adultFilter" onchange="saveSettings()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="btn-save" onclick="location.href='/'">返回首页</button>
    </div>

    <!-- 添加用户弹窗 -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <h2 class="settings-title">添加新用户</h2>
            <div class="form-group">
                <label>用户名 *</label>
                <input type="text" id="newUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码 *</label>
                <input type="password" id="newPassword" placeholder="请输入密码（至少6位）">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="newIsAdmin"> 设为管理员
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('userModal')">取消</button>
                <button class="btn-primary" onclick="createUser()">创建</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const api = window.API;
        let currentUser = null;

        function checkAuth() {
            const user = api.getUser();
            if (!user) {
                location.href = '/login';
                return;
            }
            currentUser = user;
            
            // 管理员显示用户管理区域
            if (user.is_admin) {
                document.getElementById('adminSection').classList.add('show');
                loadUsers();
            }
        }

        function loadSettings() {
            if (!currentUser) return;
            document.getElementById('themeSelect').value = currentUser.theme || 'auto';
            document.getElementById('layoutSelect').value = currentUser.layout || 'grid';
            document.getElementById('itemsPerPageSelect').value = currentUser.items_per_page || 24;
            document.getElementById('adultFilter').checked = currentUser.is_adult === false;
        }

        async function saveSettings() {
            if (!currentUser) return;

            const data = {
                theme: document.getElementById('themeSelect').value,
                layout: document.getElementById('layoutSelect').value,
                items_per_page: parseInt(document.getElementById('itemsPerPageSelect').value),
                is_adult: !document.getElementById('adultFilter').checked
            };

            try {
                await fetch('/api/user/settings', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + currentUser.id 
                    },
                    body: JSON.stringify(data)
                });
                currentUser = { ...currentUser, ...data };
                localStorage.setItem('user', JSON.stringify(currentUser));
                showToast('设置已保存');
            } catch (err) {
                showToast('保存失败');
            }
        }

        // 加载用户列表
        async function loadUsers() {
            if (!currentUser || !currentUser.is_admin) return;
            
            try {
                const res = await fetch('/api/admin/users', { 
                    headers: { 'Authorization': 'Bearer ' + currentUser.id } 
                });
                const data = await res.json();
                if (data.code === 0) {
                    renderUsers(data.data || []);
                }
            } catch (e) {
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="4">加载失败</td></tr>';
            }
        }

        function renderUsers(users) {
            if (users.length === 0) {
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="4">暂无用户</td></tr>';
                return;
            }
            document.getElementById('usersTable').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.is_admin ? '<span class="badge badge-warning">管理员</span>' : '<span class="badge badge-success">普通用户</span>'}</td>
                    <td>
                        ${!u.is_admin ? `<button class="btn-danger" onclick="deleteUser(${u.id})">删除</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function showAddUserModal() {
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newIsAdmin').checked = false;
            document.getElementById('userModal').classList.add('show');
        }

        async function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const isAdmin = document.getElementById('newIsAdmin').checked;
            
            if (!username || !password) {
                showToast('请填写用户名和密码');
                return;
            }
            if (password.length < 6) {
                showToast('密码至少6位');
                return;
            }
            
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + currentUser.id 
                    },
                    body: JSON.stringify({ username, password, is_admin: isAdmin })
                });
                const result = await res.json();
                if (result.code === 0) {
                    closeModal('userModal');
                    loadUsers();
                    showToast('创建成功');
                } else {
                    showToast(result.message || '创建失败');
                }
            } catch (e) {
                showToast('创建失败');
            }
        }

        async function deleteUser(id) {
            if (!confirm('确定删除此用户？')) return;
            try {
                await fetch(`/api/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                loadUsers();
                showToast('删除成功');
            } catch (e) {
                showToast('删除失败');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        checkAuth();
        loadSettings();
    </script>
</body>
</html>
