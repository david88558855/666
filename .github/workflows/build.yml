name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build
        env:
          CGO_ENABLED: '0'
        run: |
          echo "=== Environment ==="
          go version
          go env GOOS GOARCH CGO_ENABLED
          
          echo "=== Building ==="
          go build -v -ldflags="-s -w" -o katelyatv-go ./cmd/server
          
          echo "=== Result ==="
          ls -la katelyatv-go
          file katelyatv-go
