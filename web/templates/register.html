<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - KatelyaTV-Go</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 12px;
        }
        .auth-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background: #c62f2f;
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary-color);
        }
        .error-msg {
            color: #f44336;
            text-align: center;
            margin-bottom: 15px;
        }
        .register-closed {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">🎬 KatelyaTV-Go</a>
        </div>
    </header>

    <div class="auth-container" id="registerFormContainer">
        <h1 class="auth-title">注册</h1>
        <div class="error-msg" id="errorMsg" style="display:none;"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="请输入用户名 (3-50字符)" minlength="3" maxlength="50">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码 (至少6位)" minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password2" required placeholder="请再次输入密码">
            </div>
            <button type="submit" class="btn-submit">注册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>

    <div class="auth-container" id="registerClosed" style="display:none;">
        <div class="register-closed">
            <h2>注册已关闭</h2>
            <p>管理员已关闭注册功能</p>
            <p><a href="/login">返回登录</a></p>
        </div>
    </div>

    <script>
        // 检查注册是否开放
        fetch('/api/admin/config')
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    // 如果已有用户，注册可能关闭
                    const registerEnabled = data.data?.register_enabled;
                    if (registerEnabled === false) {
                        document.getElementById('registerFormContainer').style.display = 'none';
                        document.getElementById('registerClosed').style.display = 'block';
                    }
                }
            })
            .catch(() => {});

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errorMsg = document.getElementById('errorMsg');

            if (form.password.value !== form.password2.value) {
                errorMsg.textContent = '两次密码不一致';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        password: form.password.value
                    })
                });

                const data = await res.json();

                if (data.code === 0) {
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    localStorage.setItem('token', data.data.token);
                    alert('注册成功！您是第一个用户，已成为管理员');
                    location.href = '/';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = '注册失败，请稍后重试';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
