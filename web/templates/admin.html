<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - KatelyaTV-Go</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .admin-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.3s;
        }
        .admin-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .table th {
            color: var(--text-secondary);
            font-weight: normal;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-edit {
            background: var(--primary-color);
            color: #fff;
        }
        .btn-delete {
            background: #f44336;
            color: #fff;
        }
        .btn-danger {
            background: #f44336;
            color: #fff;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4CAF50;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input {
            width: auto;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-color);
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">🎬 KatelyaTV-Go</a>
                <nav class="nav">
                    <a href="/" class="nav-item">首页</a>
                    <a href="/admin" class="nav-item active">管理后台</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h1>管理后台</h1>
            <a href="/" class="btn btn-login">返回首页</a>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statUsers">-</div>
                <div class="stat-label">用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statFavorites">-</div>
                <div class="stat-label">收藏数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statHistory">-</div>
                <div class="stat-label">历史记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSources">-</div>
                <div class="stat-label">视频源</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="sources">视频源管理</button>
            <button class="admin-tab" data-tab="users">用户管理</button>
            <button class="admin-tab" data-tab="settings">系统设置</button>
        </div>

        <!-- 视频源管理 -->
        <div class="card" id="tabSources">
            <div class="card-title">
                <span>视频源列表</span>
                <button class="btn-small btn-edit" onclick="showAddSourceModal()">+ 添加源</button>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>API地址</th>
                        <th>成人内容</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="sourcesTable">
                    <tr><td colspan="6">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 用户管理 -->
        <div class="card" id="tabUsers" style="display:none;">
            <div class="card-title">
                <span>用户列表</span>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="5">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 系统设置 -->
        <div class="card" id="tabSettings" style="display:none;">
            <div class="card-title">
                <span>系统设置</span>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="registerSwitch">
                    <label for="registerSwitch">允许新用户注册</label>
                </div>
                <p style="color: var(--text-secondary); font-size: 12px; margin-top: 5px;">
                    关闭后，普通用户将无法自行注册。管理员可手动添加用户。
                </p>
            </div>
            <button class="btn-small btn-edit" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <!-- 添加/编辑源弹窗 -->
    <div class="modal" id="sourceModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">添加视频源</h2>
            <input type="hidden" id="sourceId">
            <div class="form-group">
                <label>源名称</label>
                <input type="text" id="sourceName" placeholder="例如：默认资源站">
            </div>
            <div class="form-group">
                <label>API地址</label>
                <input type="text" id="sourceApi" placeholder="例如：https://api.example.com/provide/vod">
            </div>
            <div class="form-group">
                <label>详情页URL（可选）</label>
                <input type="text" id="sourceDetail" placeholder="例如：https://example.com">
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="sourceIsAdult">
                    <label for="sourceIsAdult">标记为成人内容源</label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-small" onclick="closeModal()">取消</button>
                <button class="btn-small btn-edit" onclick="saveSource()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const api = window.API;
        let currentUser = null;

        // 检查登录状态
        function checkAuth() {
            const user = api.getUser();
            if (!user) {
                location.href = '/login';
                return;
            }
            currentUser = user;
            if (!user.is_admin) {
                alert('需要管理员权限');
                location.href = '/';
                return;
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('statUsers').textContent = data.total_users || 0;
                }
            } catch (err) {}
        }

        // 加载视频源
        async function loadSources() {
            try {
                const res = await fetch('/api/admin/sources', {
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                const data = await res.json();
                if (data.code === 0) {
                    renderSources(data.data || []);
                }
            } catch (err) {
                document.getElementById('sourcesTable').innerHTML = '<tr><td colspan="6">加载失败</td></tr>';
            }
        }

        function renderSources(sources) {
            if (sources.length === 0) {
                document.getElementById('sourcesTable').innerHTML = '<tr><td colspan="6">暂无数据</td></tr>';
                return;
            }
            document.getElementById('sourcesTable').innerHTML = sources.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${s.api}</td>
                    <td>${s.is_adult ? '是' : '否'}</td>
                    <td>${s.enabled ? '启用' : '禁用'}</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="editSource(${s.id})">编辑</button>
                        <button class="btn-small btn-delete" onclick="deleteSource(${s.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('statSources').textContent = sources.length;
        }

        // 加载用户
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                const data = await res.json();
                if (data.code === 0) {
                    renderUsers(data.data || []);
                }
            } catch (err) {
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="5">加载失败</td></tr>';
            }
        }

        function renderUsers(users) {
            if (users.length === 0) {
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
                return;
            }
            document.getElementById('usersTable').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.is_admin ? '管理员' : '普通用户'}</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        ${!u.is_admin ? `<button class="btn-small btn-delete" onclick="deleteUser(${u.id})">删除</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        // 加载设置
        async function loadSettings() {
            try {
                const res = await fetch('/api/admin/config', {
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('registerSwitch').checked = data.data?.register_enabled !== false;
                }
            } catch (err) {}
        }

        // 保存设置
        async function saveSettings() {
            const enabled = document.getElementById('registerSwitch').checked;
            try {
                await fetch('/api/admin/register', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentUser.id },
                    body: JSON.stringify({ enabled })
                });
                alert('设置已保存');
            } catch (err) {
                alert('保存失败');
            }
        }

        // 弹窗操作
        function showAddSourceModal() {
            document.getElementById('modalTitle').textContent = '添加视频源';
            document.getElementById('sourceId').value = '';
            document.getElementById('sourceName').value = '';
            document.getElementById('sourceApi').value = '';
            document.getElementById('sourceDetail').value = '';
            document.getElementById('sourceIsAdult').checked = false;
            document.getElementById('sourceModal').classList.add('show');
        }

        async function editSource(id) {
            const sources = await fetch('/api/admin/sources', {
                headers: { 'Authorization': 'Bearer ' + currentUser.id }
            }).then(r => r.json()).then(d => d.data || []);
            const source = sources.find(s => s.id === id);
            if (source) {
                document.getElementById('modalTitle').textContent = '编辑视频源';
                document.getElementById('sourceId').value = source.id;
                document.getElementById('sourceName').value = source.name;
                document.getElementById('sourceApi').value = source.api;
                document.getElementById('sourceDetail').value = source.detail || '';
                document.getElementById('sourceIsAdult').checked = source.is_adult;
                document.getElementById('sourceModal').classList.add('show');
            }
        }

        async function saveSource() {
            const id = document.getElementById('sourceId').value;
            const data = {
                name: document.getElementById('sourceName').value,
                api: document.getElementById('sourceApi').value,
                detail: document.getElementById('sourceDetail').value,
                is_adult: document.getElementById('sourceIsAdult').checked
            };

            const url = id ? `/api/admin/sources/${id}` : '/api/admin/sources';
            const method = id ? 'PUT' : 'POST';

            try {
                await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentUser.id },
                    body: JSON.stringify(data)
                });
                closeModal();
                loadSources();
            } catch (err) {
                alert('保存失败');
            }
        }

        async function deleteSource(id) {
            if (!confirm('确定删除此视频源？')) return;
            try {
                await fetch(`/api/admin/sources/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                loadSources();
            } catch (err) {
                alert('删除失败');
            }
        }

        async function deleteUser(id) {
            if (!confirm('确定删除此用户？')) return;
            try {
                await fetch(`/api/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentUser.id }
                });
                loadUsers();
            } catch (err) {
                alert('删除失败');
            }
        }

        function closeModal() {
            document.getElementById('sourceModal').classList.remove('show');
        }

        // 标签页切换
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
                document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).style.display = 'block';
            });
        });

        // 初始化
        checkAuth();
        loadStats();
        loadSources();
        loadUsers();
        loadSettings();
    </script>
</body>
</html>
